name: INTELLI-CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  intelligent-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile Python files
        run: python -m py_compile app.py github_ci_runner.py test_api.py

      - name: Extract commit features
        id: features
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            FILES_CHANGED=$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" | wc -l)
            LINES_ADDED=$(git diff --numstat "$BEFORE_SHA" "$CURRENT_SHA" | awk '{add+=$1} END {print add+0}')
            LINES_DELETED=$(git diff --numstat "$BEFORE_SHA" "$CURRENT_SHA" | awk '{del+=$2} END {print del+0}')
          else
            FILES_CHANGED=$(git show --pretty="" --name-only "$CURRENT_SHA" | wc -l)
            LINES_ADDED=$(git show --numstat --format="" "$CURRENT_SHA" | awk '{add+=$1} END {print add+0}')
            LINES_DELETED=$(git show --numstat --format="" "$CURRENT_SHA" | awk '{del+=$2} END {print del+0}')
          fi

          FILES_CHANGED=$(echo "$FILES_CHANGED" | tr -d '[:space:]')
          LINES_ADDED=$(echo "$LINES_ADDED" | tr -d '[:space:]')
          LINES_DELETED=$(echo "$LINES_DELETED" | tr -d '[:space:]')
          CODE_CHURN=$((LINES_ADDED + LINES_DELETED))
          COMMIT_HOUR=$(date +%H)
          COMMIT_DAY=$(date +%u)

          echo "files_changed=$FILES_CHANGED" >> "$GITHUB_OUTPUT"
          echo "lines_added=$LINES_ADDED" >> "$GITHUB_OUTPUT"
          echo "lines_deleted=$LINES_DELETED" >> "$GITHUB_OUTPUT"
          echo "code_churn=$CODE_CHURN" >> "$GITHUB_OUTPUT"
          echo "commit_hour=$COMMIT_HOUR" >> "$GITHUB_OUTPUT"
          echo "commit_day=$COMMIT_DAY" >> "$GITHUB_OUTPUT"

      - name: Call local INTELLI-CI API
        id: predict
        env:
          FILES_CHANGED: ${{ steps.features.outputs.files_changed }}
          LINES_ADDED: ${{ steps.features.outputs.lines_added }}
          LINES_DELETED: ${{ steps.features.outputs.lines_deleted }}
          CODE_CHURN: ${{ steps.features.outputs.code_churn }}
          COMMIT_HOUR: ${{ steps.features.outputs.commit_hour }}
          COMMIT_DAY: ${{ steps.features.outputs.commit_day }}
        run: |
          python -c "import json, os; from app import app; client = app.test_client(); payload = {'files_changed': int(os.environ['FILES_CHANGED']), 'lines_added': int(os.environ['LINES_ADDED']), 'lines_deleted': int(os.environ['LINES_DELETED']), 'code_churn': int(os.environ['CODE_CHURN']), 'commit_hour': int(os.environ['COMMIT_HOUR']), 'commit_day': int(os.environ['COMMIT_DAY']), 'historical_failure_rate': 0.1, 'is_weekend': 1 if int(os.environ['COMMIT_DAY']) >= 6 else 0, 'large_commit_flag': 1 if int(os.environ['CODE_CHURN']) > 400 else 0, 'recent_failure_flag': 0, 'execution_time': 15}; response = client.post('/predict', json=payload); assert response.status_code == 200, response.get_data(as_text=True); data = response.get_json(); open('prediction.json', 'w', encoding='utf-8').write(json.dumps(data)); print(json.dumps(data))"

      - name: Parse decision
        id: decision
        shell: bash
        run: |
          DECISION=$(python -c "import json; print(json.load(open('prediction.json', 'r', encoding='utf-8'))['decision'])")
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"

      - name: Run pytest suite
        if: steps.decision.outputs.decision == 'RUN_FULL_TESTS'
        shell: bash
        run: |
          if compgen -G "test_*.py" > /dev/null || [ -d tests ]; then
            pytest
          else
            echo "No pytest tests found."
          fi

      - name: Skip pytest suite
        if: steps.decision.outputs.decision == 'SKIP_TESTS'
        run: echo "Skipping pytest suite based on INTELLI-CI decision."
