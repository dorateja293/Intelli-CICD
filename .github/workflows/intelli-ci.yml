name: INTELLI-CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  intelligent-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile Python files
        run: python -m py_compile app.py github_ci_runner.py test_api.py

      - name: Extract commit features
        id: features
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            FILES_CHANGED=$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" | wc -l)
          else
            FILES_CHANGED=$(git show --pretty="" --name-only "$CURRENT_SHA" | wc -l)
          fi

          FILES_CHANGED=$(echo "$FILES_CHANGED" | tr -d '[:space:]')
          if [ -z "$FILES_CHANGED" ]; then
            FILES_CHANGED=0
          fi

          echo "files_changed=$FILES_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Call local INTELLI-CI API
        id: predict
        env:
          FILES_CHANGED: ${{ steps.features.outputs.files_changed }}
        run: |
          python -c "import json, os; from app import app; client = app.test_client(); files_changed = int(os.environ['FILES_CHANGED']); payload = {'files_changed': files_changed, 'lines_added': 10, 'lines_deleted': 5, 'code_churn': 15, 'commit_hour': 12, 'commit_day': 2, 'historical_failure_rate': 0.1, 'is_weekend': 0, 'large_commit_flag': 0, 'recent_failure_flag': 0, 'execution_time': 15}; response = client.post('/predict', json=payload); assert response.status_code == 200, response.get_data(as_text=True); data = response.get_json(); open('prediction.json', 'w', encoding='utf-8').write(json.dumps(data)); print(json.dumps(data))"

      - name: Parse decision
        id: decision
        shell: bash
        run: |
          DECISION=$(python -c "import json; print(json.load(open('prediction.json', 'r', encoding='utf-8'))['decision'])")
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"

      - name: Run pytest suite
        if: steps.decision.outputs.decision == 'RUN_FULL_TESTS'
        shell: bash
        run: |
          if compgen -G "test_*.py" > /dev/null || [ -d tests ]; then
            pytest
          else
            echo "No pytest tests found."
          fi

      - name: Skip pytest suite
        if: steps.decision.outputs.decision == 'SKIP_TESTS'
        run: echo "Skipping pytest suite based on INTELLI-CI decision."
