name: Intelli-CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend lint + tests ────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: intellici_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/intellici_test
          SECRET_KEY: test-secret-key
          LLM_PROVIDER: none
        run: pytest backend/tests/ -v --tb=short

  # ── ML engine ───────────────────────────────────────────────────────────────
  ml-engine:
    name: ML Engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml-engine/requirements.txt

      - name: Install ML dependencies
        run: pip install -r ml-engine/requirements.txt

      - name: Generate dataset and train model
        run: |
          python -m ml-engine.dataset.generate_dataset --samples 500 \
            --out ml-engine/dataset/commits_ci.csv
          python -m ml-engine.training.train \
            --data ml-engine/dataset/commits_ci.csv \
            --out ml-engine/models/model.pkl

      - name: Run quick prediction smoke test
        run: |
          python -m ml-engine.predictor.predict \
            --files_changed 5 --lines_added 100 --lines_deleted 20 \
            --previous_failures 1 --test_coverage 70

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: ml-engine/models/model.pkl

  # ── Frontend build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ── Docker build smoke test ─────────────────────────────────────────────────
  docker:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    needs: [backend, ml-engine, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: ml-engine/models/

      - name: Build and start services
        working-directory: devops
        run: docker compose up -d --build postgres redis backend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "Backend healthy" && exit 0
            sleep 3
          done
          echo "Backend did not become healthy" && exit 1

      - name: Tear down
        if: always()
        working-directory: devops
        run: docker compose down -v
